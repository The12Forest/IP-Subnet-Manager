<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#161616"/>

  <!-- Network lines -->
  <line x1="16" y1="10" x2="8"  y2="22" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="10" x2="24" y2="22" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8"  y1="22" x2="24" y2="22" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Top node (server) -->
  <circle cx="16" cy="10" r="3.5" fill="#3b82f6"/>

  <!-- Bottom-left node -->
  <circle cx="8"  cy="22" r="2.5" fill="#22c55e"/>

  <!-- Bottom-right node -->
  <circle cx="24" cy="22" r="2.5" fill="#22c55e"/>
</svg>
