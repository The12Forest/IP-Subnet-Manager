# Build compose — builds the image locally from source
# Run with: docker compose -f docker-compose.build.yml up -d
version: '3.8'

services:
  subnet-manager:
    build:
      context: .
      dockerfile: Dockerfile
    image: subnet-manager:local
    container_name: subnet-manager
    ports:
      - "${PORT:-3000}:3000"
      - "${MCP_PORT:-3001}:3001"
    volumes:
      - ./Backend/data:/app/Backend/data
      - ./Certs:/app/Certs
      - ./Logs:/app/Logs
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_EXPIRY=${JWT_EXPIRY:-7d}
      - MCP_TOKEN=${MCP_TOKEN:-}
      - HTTPS_MODE=${HTTPS_MODE:-off}
      - SSL_CERT_PATH=${SSL_CERT_PATH:-/app/Certs/server.cert}
      - SSL_KEY_PATH=${SSL_KEY_PATH:-/app/Certs/server.key}
      - HOSTNAME=${HOSTNAME:-localhost}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-60}
      - CHECK_TIMEOUT=${CHECK_TIMEOUT:-2000}
      - CHECK_ENABLED=${CHECK_ENABLED:-true}
      - SETUP_WIZARD=${SETUP_WIZARD:-auto}
      - MAX_USERS=${MAX_USERS:-0}
      - SESSION_TIMEOUT=${SESSION_TIMEOUT:-3600}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
