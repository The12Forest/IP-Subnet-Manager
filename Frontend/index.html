<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subnet Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header">
        <h1>Subnet Manager</h1>
        <div id="stats-container">
            <!-- Stats cards will be rendered here -->
        </div>
        <div id="controls">
            <button id="theme-toggle">Toggle Theme</button>
            <div id="user-menu" style="display: none;">
                <span id="current-user"></span>
                <button id="logout-btn">Logout</button>
            </div>
        </div>
    </header>

    <main>
        <div id="search-bar">
            <input type="search" placeholder="Filter by IP or name...">
        </div>

        <div id="subnet-grid">
            <!-- Subnet cards will be rendered here by app.js -->
        </div>
    </main>

    <!-- Modals -->
    <div id="login-modal" class="modal" style="display: none;">
        <div class="modal-content card">
            <h2>Login</h2>
            <form id="login-form">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

    <div id="add-host-modal" class="modal" style="display: none;">
        <!-- Add/Edit host form will be rendered here -->
    </div>

    <!-- Settings Panel -->
    <aside id="settings-panel" style="display: none;">
        <!-- Settings content will be rendered here -->
    </aside>
    
    <!-- Setup Wizard -->
    <div id="wizard-overlay" class="modal" style="display: none;">
        <!-- Setup wizard form will be rendered here -->
    </div>

    <script src="app.js"></script>
    <script src="wizard.js"></script>
    <script src="settings.js"></script>
    <script src="users.js"></script>
</body>
</html>
